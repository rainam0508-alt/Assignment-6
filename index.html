<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 6 Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
}

.container {
  width: 400px;
  margin: 40px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

form {
  display: flex;
  flex-direction: column;
}

label {
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  padding: 8px;
  margin-top: 5px;
}

span {
  color: red;
  font-size: 12px;
}

button {
  margin-top: 15px;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<div class="container">
<h2>Form Validation</h2>

<form onsubmit="return handleSubmit()">

<!-- Name -->
<label>Name:</label>
<input type="text" id="name">
<span id="nameError"></span>

<!-- Email -->
<label>Email:</label>
<input type="text" id="email">
<span id="emailError"></span>

<!-- Password -->
<label>Password:</label>
<input type="password" id="password">
<span id="passError"></span>

<!-- City -->
<label>City:</label>
<select id="city">
  <option value="">Select City</option>
  <option>Rawalpindi</option>
  <option>Lahore</option>
  <option>Karachi</option>
</select>
<span id="cityError"></span>

<!-- Gender -->
<label>Gender:</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<span id="genderError"></span>

<!-- Hobbies -->
<label>Hobbies:</label>
<input type="checkbox" class="hobby" value="Reading"> Reading
<input type="checkbox" class="hobby" value="Gaming"> Gaming
<input type="checkbox" class="hobby" value="Sports"> Sports
<span id="hobbyError"></span>

<!-- Button -->
<button id="submitBtn" disabled>Submit</button>

</form>
</div>

<script>

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const cityInput = document.getElementById("city");
const submitBtn = document.getElementById("submitBtn");

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", validateForm);
});

function validateForm() {

let valid = true;

// Clear errors
document.querySelectorAll("span").forEach(s => s.innerText = "");

// NAME
let name = nameInput.value.trim();
if (name === "") {
  document.getElementById("nameError").innerText = "Name required";
  valid = false;
} else if (name.length !== 3) {
  document.getElementById("nameError").innerText = "Exactly 3 characters";
  valid = false;
}

// EMAIL
let email = emailInput.value.trim();
if (email === "") {
  document.getElementById("emailError").innerText = "Email required";
  valid = false;
} else if (!email.includes("@") || !email.endsWith(".com")) {
  document.getElementById("emailError").innerText = "Invalid email";
  valid = false;
}

// PASSWORD
let password = passwordInput.value.trim();

let letters = (password.match(/[a-zA-Z]/g) || []).length;
let digits = (password.match(/[0-9]/g) || []).length;
let special = (password.match(/[^a-zA-Z0-9]/g) || []).length;

if (password === "") {
  document.getElementById("passError").innerText = "Password required";
  valid = false;
} else if (password.length !== 8 || letters !== 3 || digits !== 4 || special !== 1) {
  document.getElementById("passError").innerText = "3 letters, 4 digits, 1 special (8 chars)";
  valid = false;
}

// CITY
if (cityInput.value === "") {
  document.getElementById("cityError").innerText = "Select city";
  valid = false;
}

// GENDER
let gender = document.querySelector('input[name="gender"]:checked');
if (!gender) {
  document.getElementById("genderError").innerText = "Select gender";
  valid = false;
}

// HOBBIES
let hobbies = document.querySelectorAll(".hobby:checked");
if (hobbies.length === 0) {
  document.getElementById("hobbyError").innerText = "Select at least 1 hobby";
  valid = false;
}

// BUTTON
submitBtn.disabled = !valid;

}

function handleSubmit() {
  alert("Form submitted successfully!");
  return false;
}

</script>

</body>
</html>
