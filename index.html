<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 6 Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, gray,rgb(119, 119, 243));
}

.container {
  width: 400px;
  margin: 40px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

form {
  display: flex;
  flex-direction: column;
}

label {
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  padding: 8px;
  margin-top: 5px;
}

span {
  color: red;
  font-size: 12px;
}

/* ✅ COLUMN ALIGNMENT FIX */
.gender-group, .hobby-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 5px;
  align-items: flex-start;
}

.gender-group label,
.hobby-group label {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* button */
button {
  margin-top: 15px;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  background: gray;
}

/* success message */
#successMessage {
  display: none;
  background: #c8e6c9;
  padding: 20px;
  border-radius: 8px;
  margin-top: 15px;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration Form</h2>

<form id="myForm" onsubmit="return handleSubmit()">

<!-- Name -->
<label>Name:</label>
<input type="text" id="name">
<span id="nameError"></span>

<!-- Email -->
<label>Email:</label>
<input type="text" id="email">
<span id="emailError"></span>

<!-- Password -->
<label>Password:</label>
<input type="password" id="password">
<span id="passError"></span>

<!-- City -->
<label>City:</label>
<select id="city">
  <option value="">Select City</option>
  <option>Rawalpindi</option>
  <option>Lahore</option>
  <option>Karachi</option>
</select>
<span id="cityError"></span>

<!-- Gender -->
<label>Gender:</label>
<div class="gender-group">
  <label><input type="radio" name="gender" value="Male"> Male</label>
  <label><input type="radio" name="gender" value="Female"> Female</label>
</div>
<span id="genderError"></span>

<!-- Hobbies -->
<label>Hobbies:</label>
<div class="hobby-group">
  <label><input type="checkbox" class="hobby" value="Playing Cricket"> Playing Cricket</label>
  <label><input type="checkbox" class="hobby" value="Coding"> Coding</label>
</div>
<span id="hobbyError"></span>

<!-- Button -->
<button id="submitBtn" disabled>Submit</button>

</form>

<!-- Success Message -->
<div id="successMessage">
  <h3>Success!</h3>
  <p>Form submitted successfully</p>
</div>

</div>

<script>
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const cityInput = document.getElementById("city");
const submitBtn = document.getElementById("submitBtn");

let touched = {
  name: false,
  email: false,
  password: false,
  city: false,
  gender: false,
  hobby: false
};

function validateForm() {

let valid = true;

// NAME
if (touched.name) {
  let name = nameInput.value.trim();
  if (name === "") {
    nameError.innerText = "Name required";
    valid = false;
  } else if (name.length < 3) {
    nameError.innerText = "At least 3 characters required";
    valid = false;
  } else {
    nameError.innerText = "";
  }
}

// EMAIL
if (touched.email) {
  let email = emailInput.value.trim();
  if (email === "") {
    emailError.innerText = "Email required";
    valid = false;
  } else if (!email.includes("@") || !email.endsWith(".com")) {
    emailError.innerText = "Invalid email";
    valid = false;
  } else {
    emailError.innerText = "";
  }
}

// PASSWORD
if (touched.password) {
  let password = passwordInput.value.trim();

  let letters = (password.match(/[a-zA-Z]/g) || []).length;
  let digits = (password.match(/[0-9]/g) || []).length;
  let special = (password.match(/[^a-zA-Z0-9]/g) || []).length;

  if (password === "") {
    passError.innerText = "Password required";
    valid = false;
  } else if (password.length !== 8 || letters !== 3 || digits !== 4 || special !== 1) {
    passError.innerText = "3 letters, 4 digits, 1 special (8 chars)";
    valid = false;
  } else {
    passError.innerText = "";
  }
}

// CITY
if (touched.city) {
  if (cityInput.value === "") {
    cityError.innerText = "Select city";
    valid = false;
  } else {
    cityError.innerText = "";
  }
}

// GENDER
if (touched.gender) {
  let gender = document.querySelector('input[name="gender"]:checked');
  if (!gender) {
    genderError.innerText = "Select gender";
    valid = false;
  } else {
    genderError.innerText = "";
  }
}

// HOBBIES
if (touched.hobby) {
  let hobbies = document.querySelectorAll(".hobby:checked");
  if (hobbies.length === 0) {
    hobbyError.innerText = "Select at least 1 hobby";
    valid = false;
  } else {
    hobbyError.innerText = "";
  }
}

submitBtn.disabled = !valid;
}

// EVENTS
nameInput.addEventListener("input", () => { touched.name = true; validateForm(); });
emailInput.addEventListener("input", () => { touched.email = true; validateForm(); });
passwordInput.addEventListener("input", () => { touched.password = true; validateForm(); });
cityInput.addEventListener("change", () => { touched.city = true; validateForm(); });

document.querySelectorAll('input[name="gender"]').forEach(el => {
  el.addEventListener("change", () => { touched.gender = true; validateForm(); });
});

document.querySelectorAll('.hobby').forEach(el => {
  el.addEventListener("change", () => { touched.hobby = true; validateForm(); });
});

// SUBMIT
function handleSubmit() {
  validateForm();

  if (!submitBtn.disabled) {
    document.getElementById("myForm").style.display = "none";
    document.getElementById("successMessage").style.display = "block";
  }

  return false;
}
</script>

</body>
</html>
