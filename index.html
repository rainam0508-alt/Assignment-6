<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment 6 Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to right, #667eea, #764ba2);
}

.container {
  width: 350px;
  margin: 60px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

form {
  display: flex;
  flex-direction: column;
}

label {
  margin-top: 10px;
  font-weight: bold;
}

input {
  padding: 10px;
  margin-top: 5px;
}

span {
  color: red;
  font-size: 12px;
}

button {
  margin-top: 15px;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  background: gray;
}
</style>
</head>

<body>

<div class="container">
<h2>Form Validation</h2>

<form onsubmit="return handleSubmit()">

<label>Name:</label>
<input type="text" id="name">
<span id="nameError"></span>

<label>Email:</label>
<input type="text" id="email">
<span id="emailError"></span>

<label>Password:</label>
<input type="password" id="password">
<span id="passError"></span>

<button id="submitBtn" disabled>Submit</button>

</form>
</div>

<script>

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const submitBtn = document.getElementById("submitBtn");

// Real-time validation
[nameInput, emailInput, passwordInput].forEach(input => {
  input.addEventListener("input", validateForm);
});

function validateForm() {

let valid = true;

// Clear previous errors
document.getElementById("nameError").innerText = "";
document.getElementById("emailError").innerText = "";
document.getElementById("passError").innerText = "";

// 🔹 NAME
let name = nameInput.value.trim();
if (name === "") {
  document.getElementById("nameError").innerText = "Name required";
  valid = false;
} 
else if (name.length !== 3) {
  document.getElementById("nameError").innerText = "Must be exactly 3 characters";
  valid = false;
}

// 🔹 EMAIL (FIXED)
let email = emailInput.value.trim();
let emailPattern = /^[^\s@]+@[^\s@]+\.com$/i;

if (email === "") {
  document.getElementById("emailError").innerText = "Email required";
  valid = false;
} 
else if (!emailPattern.test(email)) {
  document.getElementById("emailError").innerText = "Enter valid .com email";
  valid = false;
}

// 🔹 PASSWORD (FIXED)
let password = passwordInput.value.trim();

// exactly: 3 letters, 4 digits, 1 special, total 8 chars
let passwordPattern = /^(?=(.[A-Za-z]){3})(?=(.\d){4})(?=(.*[^A-Za-z0-9]){1})[A-Za-z\d^A-Za-z0-9]{8}$/;

// better simpler strict pattern:
passwordPattern = /^(?=(?:.[A-Za-z]){3})(?=(?:.\d){4})(?=(?:.*[^A-Za-z0-9]){1}).{8}$/;

if (password === "") {
  document.getElementById("passError").innerText = "Password required";
  valid = false;
} 
else if (!passwordPattern.test(password)) {
  document.getElementById("passError").innerText =
    "3 letters, 4 digits, 1 special (total 8 chars)";
  valid = false;
}

// 🔹 BUTTON CONTROL
submitBtn.disabled = !valid;
}

// 🔹 SUBMIT
function handleSubmit() {
  alert("Form submitted successfully!");
  return false;
}

</script>

</body>
</html>
